<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2566809183716381" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Plataforma interactiva de estudio de Prácticas Profesionalizantes I · Operador Básico de Computadora: hardware, software, mantenimiento, información, informes y prácticas." />
  <meta name="theme-color" content="#8B5CF6" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="favicon.svg" />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body data-theme="light">

  <!-- ======================= SIDEBAR ======================= -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <div class="brand__logo">PP<span>1</span></div>
      <div class="brand__text">
        <strong>Estudio PP1</strong>
        <span>Operador Básico de Computadora</span>
      </div>
      <button class="sidebar__close" id="sidebarClose" aria-label="Cerrar menú">✕</button>
    </div>

    <div class="sidebar__search">
      <input type="search" id="searchInput" placeholder="Buscar tema, herramienta…" autocomplete="off" />
      <div class="search__results" id="searchResults"></div>
    </div>

    <nav class="sidebar__nav" id="mainNav"><!-- generado por JS --></nav>

    <div class="sidebar__footer">
      <div class="progress-mini">
        <div class="progress-mini__label">Progreso general</div>
        <div class="progress-bar"><span id="globalProgressBar"></span></div>
        <div class="progress-mini__pct" id="globalProgressPct">0%</div>
      </div>
    </div>
  </aside>
  <div class="sidebar__overlay" id="sidebarOverlay"></div>

  <!-- ======================= MAIN ======================= -->
  <div class="app">
    <header class="topbar">
      <button class="topbar__menu" id="menuToggle" aria-label="Abrir menú">☰</button>
      <div class="topbar__crumbs" id="breadcrumbs">Inicio</div>
      <div class="topbar__actions">
        <a class="nav-hub topbar__home" href="../../../index.html" title="Volver al inicio de Valía">Inicio</a>
        <a class="nav-hub topbar__login" href="../../../index.html#entrar" title="Entrar / Crear cuenta">Entrar</a>
        <button class="icon-btn" id="themeToggle" title="Modo claro / oscuro" aria-label="Cambiar tema">🌙</button>
      </div>
    </header>

    <main class="content" id="content"><!-- generado por JS --></main>

    <footer class="footer">
      <span>Hecho para estudiar mejor · Hardware · Software · Mantenimiento · Información · Informes</span>
    </footer>
  </div>

  <!-- ======================= SCRIPTS ======================= -->
  <script src="js/data.js"></script>
  <script src="js/practice.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/games.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
  <!-- Valia: reflejar sesion iniciada en la barra -->
  <script>
  (function(){
    try{
      var key=null;
      for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i); if(/^sb-.*-auth-token$/.test(k)){key=k;break;}}
      if(!key) return;
      var s=JSON.parse(localStorage.getItem(key));
      var u=(s&&s.user)||(s&&s.currentSession&&s.currentSession.user);
      var exp=(s&&s.expires_at)||(s&&s.currentSession&&s.currentSession.expires_at);
      if(!u||(exp&&exp*1000<Date.now())) return;
      var meta=u.user_metadata||{};
      var name=meta.username||meta.full_name||u.email||"Mi cuenta";
      var login=document.querySelector(".topbar__login");
      var home=document.querySelector(".topbar__home");
      if(login){
        login.textContent=name.length>16?name.slice(0,16)+"\u2026":name;
        if(home){ login.setAttribute("href", home.getAttribute("href").replace("index.html","panel.html")); }
        login.setAttribute("title","Ir a mi panel");
      }
    }catch(e){}
  })();
  </script>
</body>
</html>
